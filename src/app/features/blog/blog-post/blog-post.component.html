<section class="p-6 max-w-3xl mx-auto">
	@if (isLoading()) {
		<p class="text-gray-500 dark:text-gray-600">Loading article...</p>
	} @else if (!post()) {
		<div class="text-center py-12">
			<h2 class="text-2xl font-semibold text-gray-900 dark:text-gray-400 mb-4">Post not found</h2>
			<a routerLink="/blog" class="text-[#FEA55F] hover:underline">Back to blog</a>
		</div>
	} @else {
		<a routerLink="/blog" class="inline-flex items-center gap-1 text-sm text-gray-500 dark:text-gray-600 hover:text-[#FEA55F] mb-6">
			&larr; Back to blog
		</a>

		<article>
			<header class="mb-8">
				<h1 class="text-3xl font-bold text-gray-900 dark:text-gray-300 mb-3">
					{{ post()!.title }}
				</h1>
				<div class="flex items-center gap-3 text-sm text-gray-500 dark:text-gray-600">
					<time>{{ post()!.date }}</time>
					<span>{{ post()!.readTime }}</span>
				</div>
				<div class="flex flex-wrap gap-2 mt-3">
					@for (tag of post()!.tags; track tag) {
						<span class="text-xs bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 px-2 py-1 rounded-full">
							{{ tag }}
						</span>
					}
				</div>
			</header>

			<div class="prose" [innerHTML]="post()!.content | appSafeHtml"></div>
		</article>
	}
</section>
