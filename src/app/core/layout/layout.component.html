<main
	class="container max-w-2xl mx-auto h-full transition-all border-x"
	[class.border-transparent]="!headerScrollClass()"
	[class.dark:border-gray-800]="headerScrollClass()">
	<a
		href="#main-content"
		class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-[200] focus:bg-white dark:focus:bg-gray-900 focus:px-4 focus:py-2 focus:rounded focus:text-gray-950 dark:focus:text-white focus:shadow-lg">
		Skip to content
	</a>

	<div class="background z-10" aria-hidden="true">
		<div class="tiles">
			<div class="tile tile-1"></div>
			<div class="tile tile-2"></div>
			<div class="tile tile-3"></div>
			<div class="tile tile-4"></div>

			<div class="tile tile-5"></div>
			<div class="tile tile-6"></div>
			<div class="tile tile-7"></div>
			<div class="tile tile-8"></div>

			<div class="tile tile-9"></div>
			<div class="tile tile-10"></div>
		</div>

		<div class="line line-1"></div>
		<div class="line line-2"></div>
		<div class="line line-3"></div>
	</div>

	<div id="main-content" class="flex flex-col h-full z-50 bg-white dark:bg-gray-950 dark:shadow relative">
		<app-header
			[class.sticky]="headerScrollClass()"
			[class.top-0]="headerScrollClass()"
			[class.border-b]="headerScrollClass()"
			[class.backdrop-blur-xl]="headerScrollClass()"
			[class.border-transparent]="!headerScrollClass()"
			[class.dark:border-gray-800]="headerScrollClass()"
			class="transition-all"></app-header>
		<div [@routeAnimations]="prepareRoute(outlet)">
			<router-outlet #outlet="outlet"></router-outlet>
		</div>
		<app-footer></app-footer>
	</div>

	@if (showScrollToTop()) {
		<button
			(click)="scrollToTop()"
			aria-label="Scroll to top"
			class="fixed bottom-6 right-6 z-[100] w-10 h-10 rounded-full bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 shadow-lg hover:shadow-xl transition-all flex items-center justify-center cursor-pointer hover:scale-110">
			<i class="ri-arrow-up-line"></i>
		</button>
	}
</main>
