<footer class="border-t border-gray-200 dark:border-gray-800 py-6 px-4 mt-auto">
	<div class="flex flex-col sm:flex-row items-center justify-between gap-4">
		<p class="text-xs text-gray-500 dark:text-gray-600">
			&copy; {{ currentYear() }} Abdelrahman Mahmoud. All rights reserved.
		</p>
		<div class="flex items-center gap-4">
			@for (link of socialLinks(); track link.label) {
				<a
					[href]="link.url"
					[attr.aria-label]="link.label"
					target="_blank"
					rel="noopener noreferrer"
					class="text-gray-500 dark:text-gray-600 hover:text-gray-900 dark:hover:text-gray-300 transition-colors">
					<i [class]="link.icon + ' text-lg'"></i>
				</a>
			}
			<a
				href="assets/resume.pdf"
				download
				aria-label="Download resume"
				class="text-xs text-gray-500 dark:text-gray-600 hover:text-gray-900 dark:hover:text-gray-300 border border-gray-300 dark:border-gray-700 rounded-full px-3 py-1 transition-colors">
				Resume
			</a>
		</div>
	</div>
</footer>
